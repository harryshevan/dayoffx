services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./.env
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    env_file:
      - ./.env
    environment:
      API_BASE_URL: http://api:8080
      ADMIN_SECRET: ${ADMIN_SECRET}
      PORT: 8081
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - ./.env
    environment:
      API_BASE_URL: http://api:8080
      BOT_SECRET: ${BOT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      PORT: 8082
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${BOT_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_BOT_URL: ${NEXT_PUBLIC_BOT_URL:-}
        NEXT_PUBLIC_MCP_URL: ${NEXT_PUBLIC_MCP_URL:-}
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_healthy
      mcp:
        condition: service_healthy
      bot:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres-data:
